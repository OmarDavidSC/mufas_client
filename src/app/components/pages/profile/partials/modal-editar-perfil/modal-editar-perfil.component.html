<h2 mat-dialog-title>{{ TituloPopup }}</h2>

<mat-dialog-content>

    <form [formGroup]="Form" class="container-fluid">
        <div class="row mb-4 text-center">
            <div class="col-12">
                <img [src]="FotoPreview" class="rounded-circle mb-2" width="120" style="cursor: pointer"
                    (click)="seleccionarFoto()" title="Click para cambiar foto" />
                <input #inputFoto type="file" hidden accept="image/*" (change)="onFotoSeleccionada($event)" />
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <button mat-stroked-button color="primary" type="button" (click)="seleccionarFoto()">
                        Cambiar
                    </button>
                    <button mat-stroked-button color="warn" type="button" (click)="eliminarFoto()">
                        Eliminar
                    </button>
                </div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Nombre</mat-label>
                    <input matInput formControlName="name">
                </mat-form-field>
            </div>
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Apellido paterno</mat-label>
                    <input matInput formControlName="paternal_surname">
                </mat-form-field>
            </div>
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Apellido materno</mat-label>
                    <input matInput formControlName="maternal_surname">
                </mat-form-field>
            </div>
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Usuario</mat-label>
                    <input matInput formControlName="username">
                </mat-form-field>
            </div>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="mt-3">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-raised-button color="primary" (click)="eventoGuardar()">
        {{ TituloButton }}
    </button>
</mat-dialog-actions>
