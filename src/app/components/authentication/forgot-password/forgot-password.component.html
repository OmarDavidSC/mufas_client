<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <mat-card class="shadow-lg">
                <mat-card-header class="d-flex justify-content-center">
                    <div class="text-center w-100">
                        <mat-icon class="mb-2" style="font-size: 42px; width: 42px; height: 42px;">lock_reset</mat-icon>
                        <mat-card-title class="fw-bold">
                            Recuperar contraseña
                        </mat-card-title>
                        <mat-card-subtitle>
                            Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
                        </mat-card-subtitle>
                    </div>
                </mat-card-header>

                <mat-divider class="my-3"></mat-divider>

                <mat-card-content>
                    <form [formGroup]="Form" (ngSubmit)="forgotPassword()" autocomplete="off">

                        <!-- EMAIL -->
                        <mat-form-field appearance="outline" class="w-100 mb-3">
                            <mat-label>Correo electrónico</mat-label>
                            <input matInput type="email" placeholder="ejemplo@correo.com" formControlName="email" />

                            <mat-icon matSuffix>mail</mat-icon>

                            <mat-error *ngIf="Form.get('email')?.hasError('required')">
                                El correo es obligatorio
                            </mat-error>
                        </mat-form-field>

                        <!-- BOTÓN -->
                        <button mat-raised-button color="primary" class="w-100 py-2"
                            [disabled]="loading || Form.invalid" type="submit">
                            <span *ngIf="!loading">
                                Enviar enlace de recuperación
                            </span>

                            <span *ngIf="loading" class="d-flex align-items-center justify-content-center gap-2">
                                <mat-spinner diameter="20"></mat-spinner>
                                Enviando...
                            </span>
                        </button>

                    </form>
                </mat-card-content>

                <mat-divider class="my-3"></mat-divider>

                <mat-card-actions class="d-flex justify-content-center pb-3">
                    <button mat-button color="accent" [routerLink]="['/login']">
                        <mat-icon class="me-1">arrow_back</mat-icon>
                        Volver al login
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>
