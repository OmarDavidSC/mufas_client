<div class="container d-flex justify-content-center align-items-center vh-100">
    <mat-card class="w-100" style="max-width: 400px;">
        <mat-card-header class="text-center">
            <img src="../../../assets/img/logoe.png" alt="Logo" class="img-fluid mb-3" style="max-height: 100px;" />
        </mat-card-header>

        <mat-card-content>
            <p class="text-center mb-3">Por favor, inicia sesión para continuar</p>

            <form [formGroup]="Form" (ngSubmit)="login()">
                <div class="mb-3">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Usuario</mat-label>
                        <input matInput formControlName="username" />
                        <mat-icon matSuffix>account_circle</mat-icon>
                    </mat-form-field>
                </div>

                <div class="mb-2">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Contraseña</mat-label>
                        <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" />
                        <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
                            <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
                        </button>
                    </mat-form-field>
                </div>

                <div class="text-end mb-3">
                    <a class="text-primary" role="button" (click)="irRecuperarPassword()">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="d-grid">
                    <button mat-raised-button color="primary" type="submit">
                        Iniciar Sesión
                        <mat-icon class="ms-1">login</mat-icon>
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>

    <app-spinner *ngIf="loading"></app-spinner>
</div>
